# 🔔 Deployment Notifications

name: 📢 CI/CD Notifications

on:
  workflow_run:
    workflows: ["🚀 Backend CI/CD — Deploy to Heroku"]
    types: [completed]

jobs:
  notify-slack:
    runs-on: ubuntu-latest
    if: always()
    steps:
    - name: 📢 Slack Notification
      uses: slackapi/slack-github-action@v1.24.0
      with:
        payload: |
          {
            "text": "Deployment ${{ github.event.workflow_run.conclusion }}: ${{ github.event.workflow_run.head_commit.message }}",
            "attachments": [
              {
                "color": "${{ github.event.workflow_run.conclusion == 'success' && 'good' || 'danger' }}",
                "title": "Smart Contract Rewriter — Heroku Deploy",
                "fields": [
                  { "title": "Status",      "value": "${{ github.event.workflow_run.conclusion }}", "short": true },
                  { "title": "Environment", "value": "Heroku Production",                           "short": true },
                  { "title": "Branch",      "value": "${{ github.event.workflow_run.head_branch }}", "short": true },
                  { "title": "Author",      "value": "${{ github.event.workflow_run.head_commit.author.name }}", "short": true },
                  { "title": "Commit",      "value": "${{ github.event.workflow_run.head_commit.message }}", "short": false }
                ],
                "footer": "GitHub Actions"
              }
            ]
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  notify-email:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'failure'
    steps:
    - name: 📧 Email Alert on Failure
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 587
        username: ${{ secrets.EMAIL_USERNAME }}
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "🚨 Deploy Failed: ${{ github.event.workflow_run.head_commit.message }}"
        to: ${{ secrets.NOTIFICATION_EMAIL }}
        from: Smart Contract CI/CD <${{ secrets.EMAIL_USERNAME }}>
        body: |
          Heroku deployment FAILED.

          Branch:  ${{ github.event.workflow_run.head_branch }}
          Commit:  ${{ github.event.workflow_run.head_sha }}
          Author:  ${{ github.event.workflow_run.head_commit.author.name }}
          Time:    ${{ github.event.workflow_run.updated_at }}

          View the run: https://github.com/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}
