name: 🚀 Backend CI/CD — Deploy to Heroku

on:
  push:
    branches: [main]
    paths: ['microservices/**', 'requirements*.txt', 'Procfile', 'runtime.txt', '.github/workflows/ci-cd.yml']
  pull_request:
    branches: [main]
    paths: ['microservices/**']
  workflow_dispatch:

jobs:
  # Stage 1: Lint & Quick Sanity Check
  test:
    name: 🧪 Test Backend
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4

    - name: 🐍 Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: 📦 Install Dependencies
      working-directory: ./microservices
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🧪 Smoke Test — Start API & Hit /health
      working-directory: ./microservices
      env:
        JWT_SECRET_KEY: test_secret_key_for_ci
        ENVIRONMENT: test
      run: |
        uvicorn unified_main:app --host 0.0.0.0 --port 8000 &
        sleep 8
        curl -f http://localhost:8000/health
        echo "✅ Health check passed"

  # Stage 2: Deploy to Heroku (main branch only)
  deploy:
    name: 🚀 Deploy to Heroku
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 🚀 Deploy to Heroku via Git Push
      env:
        HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
      run: |
        git remote add heroku https://heroku:${HEROKU_API_KEY}@git.heroku.com/${{ secrets.HEROKU_APP_NAME }}.git
        git push heroku main --force
        echo "✅ Pushed to Heroku"

    - name: 🔍 Post-Deploy Health Check
      run: |
        sleep 20
        curl -f https://${{ secrets.HEROKU_APP_NAME }}.herokuapp.com/health
        echo "✅ Heroku deployment is healthy"
